services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: audio-upload-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: audiouser
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: audiodb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audiouser -d audiodb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audio-upload-backend
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: audiodb
      DB_USER: audiouser
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:81}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (nginx serving static files + proxying API to backend)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: audio-upload-frontend
    restart: unless-stopped
    ports:
      - "81:80"
      - "4443:443"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--no-check-certificate", "https://127.0.0.1:443"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
